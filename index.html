<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberWaze • Waze for Cybertruck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; color: white; font-family: system-ui; overflow: hidden; }
        #header { background: #1f2937; }
        #waze-iframe { width: 100%; height: calc(100vh - 68px); border: none; }
        button, .toggle { transition: all 0.2s; }
        .toggle-on { background-color: #84cc16; color: black; }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header" class="px-6 py-4 flex items-center justify-between shadow-2xl flex-wrap gap-3">
        <div class="flex items-center gap-x-3">
            <div class="text-4xl">⚡</div>
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-lime-400">CYBERWAZE</h1>
                <p class="text-xs text-gray-400 -mt-1">Live Traffic • Powered by Waze</p>
            </div>
        </div>

        <div class="flex items-center gap-x-4 flex-wrap">
            <!-- Follow Toggle -->
            <div onclick="toggleFollow()" id="follow-toggle"
                 class="flex items-center gap-x-2 bg-gray-700 hover:bg-gray-600 px-5 py-2 rounded-3xl cursor-pointer text-sm font-medium select-none">
                <div id="follow-dot" class="w-3 h-3 bg-red-500 rounded-full"></div>
                <span id="follow-text">Follow Vehicle: OFF</span>
            </div>

            <!-- My Location -->
            <button onclick="getCurrentLocation()" 
                    class="flex items-center gap-x-3 bg-lime-400 hover:bg-lime-300 text-black font-semibold px-6 py-3 rounded-3xl text-lg">
                📍 MY LOCATION
            </button>

            <!-- Search -->
            <div class="flex">
                <input id="search-input" 
                       onkeydown="if(event.key==='Enter') searchDestination()"
                       type="text" 
                       placeholder="Where to? (address, place, or city)"
                       class="bg-gray-800 border border-gray-600 focus:border-lime-400 w-80 px-6 py-3 rounded-l-3xl text-lg outline-none">
                <button onclick="searchDestination()" 
                        class="bg-white hover:bg-gray-100 text-black font-semibold px-8 rounded-r-3xl text-lg">GO</button>
            </div>
        </div>

        <div class="flex items-center gap-x-4 text-sm">
            <button onclick="toggleFullscreen()" class="px-5 py-3 hover:bg-gray-700 rounded-3xl">⛶ FULLSCREEN</button>
            <a href="https://www.waze.com" target="_blank" class="text-gray-400 hover:text-white">Waze.com</a>
        </div>
    </div>

    <!-- Waze Live Map -->
    <iframe id="waze-iframe" allowfullscreen></iframe>

    <script>
        const iframe = document.getElementById('waze-iframe');
        let currentLat = 27.755; // Default near Wimauma, FL
        let currentLon = -82.300;
        let watchId = null;
        let followEnabled = false;
        let lastUpdateTime = 0;

        function updateMap(lat, lon, zoom = 16) {
            currentLat = lat;
            currentLon = lon;
            const url = `https://embed.waze.com/iframe?zoom=${zoom}&lat=${lat}&lon=${lon}&pin=1`;
            iframe.src = url;
        }

        function getCurrentLocation() {
            const statusEl = document.getElementById('follow-text'); // reuse for feedback
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        updateMap(pos.coords.latitude, pos.coords.longitude, 17);
                    },
                    (err) => {
                        console.log('Geolocation error:', err);
                        alert('Location access denied or unavailable. Map will use last known position.');
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        function toggleFollow() {
            followEnabled = !followEnabled;
            const toggleEl = document.getElementById('follow-toggle');
            const dotEl = document.getElementById('follow-dot');
            const textEl = document.getElementById('follow-text');

            if (followEnabled) {
                toggleEl.classList.add('toggle-on');
                dotEl.classList.remove('bg-red-500');
                dotEl.classList.add('bg-lime-400', 'animate-pulse');
                textEl.textContent = 'Follow Vehicle: ON';
                startWatchingPosition();
            } else {
                toggleEl.classList.remove('toggle-on');
                dotEl.classList.remove('bg-lime-400', 'animate-pulse');
                dotEl.classList.add('bg-red-500');
                textEl.textContent = 'Follow Vehicle: OFF';
                stopWatchingPosition();
            }
        }

        function startWatchingPosition() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const now = Date.now();
                    if (now - lastUpdateTime < 3000) return; // throttle to ~every 3+ seconds
                    
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy || 999;
                    
                    // Only recenter if reasonably accurate and moved a bit
                    if (accuracy < 100 && 
                        (Math.abs(lat - currentLat) > 0.0005 || Math.abs(lon - currentLon) > 0.0005)) {
                        updateMap(lat, lon, 17);
                        lastUpdateTime = now;
                    }
                },
                (err) => {
                    console.log('Watch position error:', err);
                    if (followEnabled) {
                        document.getElementById('follow-text').textContent = 'Follow: Location unavailable';
                    }
                },
                { 
                    enableHighAccuracy: true, 
                    maximumAge: 5000, 
                    timeout: 10000 
                }
            );
        }

        function stopWatchingPosition() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
        }

        function searchDestination() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            const deepLink = `https://waze.com/ul?q=${encodeURIComponent(query)}&navigate=yes`;
            window.open(deepLink, '_blank');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        window.onload = () => {
            // Initial load with default or quick GPS
            getCurrentLocation();
            
            // Fallback after a short delay
            setTimeout(() => {
                if (!iframe.src) {
                    updateMap(currentLat, currentLon, 14);
                }
            }, 1500);
        };

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        });
    </script>
</body>
</html>
