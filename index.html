<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TeslaWaze • Waze for Tesla</title>
    <!-- PNG Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; color: white; font-family: system-ui; overflow: hidden; }
        #header { 
            background: #1f2937;
            z-index: 10;
            position: relative; 
        }
        #map-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 68px);
        }
        #waze-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        #dark-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            opacity: 0.35;       /* Adjust this value (0.2 = lighter, 0.5 = darker) */
            pointer-events: none; /* Allows tapping on the map */
            z-index: 5;
            transition: opacity 0.2s ease;
        }
        button, .toggle { transition: all 0.2s; }
        .toggle-on { background-color: #84cc16; color: white; }
        input[type="range"] {
            accent-color: #84cc16;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header" class="px-6 py-4 flex items-center justify-between shadow-2xl flex-wrap gap-3">
        <div class="flex items-center gap-x-3">
            <!-- <div class="text-4xl">⚡</div> -->
            <!-- Your Lightning Bolt Image -->
            <img src="lightning.png" alt="Lightning" 
                 class="w-10 h-10 object-contain">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-lime-400">TESLAWAZE</h1>
                <p class="text-xs text-gray-400 -mt-1">Live Traffic • Powered by Waze</p>
            </div>
        </div>

        <div class="flex items-center gap-x-4 flex-wrap">
            <!-- Dark Mode Slider -->
            <div class="flex items-center gap-x-2 bg-gray-800 px-4 py-2 rounded-3xl">
                <span class="text-sm font-medium text-gray-300 whitespace-nowrap">Dark Mode</span>
                <input type="range" id="dark-slider" 
                       min="0" max="70" value="35"
                       class="w-20 accent-lime-400 cursor-pointer">
                <span id="dark-value" class="text-xs font-mono text-lime-400 w-8">35%</span>
            </div>
            <!-- Follow Toggle - Smaller -->
            <div onclick="toggleFollow()" id="follow-toggle"
                 class="flex items-center gap-x-2 bg-gray-700 hover:bg-gray-600 px-4 py-2 text-sm font-medium select-none rounded-3xl cursor-pointer">
                <div id="follow-dot" class="w-3 h-3 bg-red-500 rounded-full"></div>
                <span id="follow-text">Follow: ON (1 mi)</span>
            </div>

            <!-- My Location -->
            <button onclick="getCurrentLocation()" 
                    class="flex items-center gap-x-3 bg-lime-400 hover:bg-lime-300 text-black font-semibold px-4 py-2 rounded-3xl text-lg">
                📍 MY LOCATION
            </button>

            <!-- Search - Smaller -->
            <!-- <div class="flex">
                <input id="search-input" 
                       onkeydown="if(event.key==='Enter') searchDestination()"
                       type="text" 
                       placeholder="Where to?"
                       class="bg-gray-800 border border-gray-600 focus:border-lime-400 w-64 px-5 py-2.5 rounded-l-3xl text-base outline-none">
                <button onclick="searchDestination()" 
                        class="bg-white hover:bg-gray-100 text-black font-semibold px-6 rounded-r-3xl text-base">
                    GO
                </button>
            </div> -->
        </div>

        <div class="flex items-center gap-x-4 text-sm">
            <!-- Donate Button  -->
            <button onclick="window.open('https://www.buymeacoffee.com/teslawaze', '_blank')" 
                    class="flex items-center gap-x-2 bg-amber-400 hover:bg-amber-300 text-black font-semibold px-4 py-2 rounded-3xl text-lg">
                ☕ Support TeslaWaze
            </button>
        </div>
    </div>

    <!-- Waze Live Map -->
    <div id="map-container">
    <iframe id="waze-iframe" allowfullscreen></iframe>
        <iframe id="waze-iframe" allowfullscreen></iframe>
        <div id="dark-overlay"></div>
    </div>

    <script>
        const iframe = document.getElementById('waze-iframe');
        const overlay = document.getElementById('dark-overlay');
        const slider = document.getElementById('dark-slider');
        const valueDisplay = document.getElementById('dark-value');
        let currentLat = 27.755;
        let currentLon = -82.300;
        let currentZoom = 14;           // Default zoom level
        let watchId = null;
        let followEnabled = false;
        let lastUpdateLat = 27.755;
        let lastUpdateLon = -82.300;
        let darkOverlayEnabled = true;
        const MILE_IN_METERS = 1609;    // ~1 mile threshold

        // Load saved overlay preference
        function loadDarkModePreference() {
            const saved = localStorage.getItem('teslawaze_dark_opacity');
            if (saved !== null) {
                slider.value = saved;
            }
            updateOverlay();
        }

        function saveDarkModePreference() {
            localStorage.setItem('teslawaze_dark_opacity', slider.value);
        }

        function updateOverlay() {
            const opacity = parseFloat(slider.value) / 100;
            overlay.style.opacity = opacity;
            valueDisplay.textContent = slider.value + '%';
        }

        function toggleDarkOverlay() {
            darkOverlayEnabled = !darkOverlayEnabled;
            updateOverlayUI();
            saveOverlayPreference();
        }

        // Haversine distance in meters
        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Safely get current zoom from iframe
        function getCurrentZoomFromIframe() {
            try {
                const src = iframe.src;
                if (src) {
                    const match = src.match(/zoom=(\d+)/);
                    if (match && match[1]) return parseInt(match[1], 10);
                }
            } catch (e) {}
            return currentZoom;
        }

        function updateMap(lat, lon, zoom = null) {
            if (zoom === null) zoom = getCurrentZoomFromIframe();
            currentZoom = Math.max(3, Math.min(17, zoom));
            currentLat = lat;
            currentLon = lon;
            
            const url = `https://embed.waze.com/iframe?zoom=${currentZoom}&lat=${lat}&lon=${lon}&pin=1`;
            iframe.src = url;
            
            // Update last position for distance tracking
            lastUpdateLat = lat;
            lastUpdateLon = lon;
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const zoomToUse = getCurrentZoomFromIframe();
                        updateMap(pos.coords.latitude, pos.coords.longitude, zoomToUse);
                    },
                    (err) => {
                        console.log('Geolocation error:', err);
                        alert('Location access unavailable. Using last known position.');
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        function toggleFollow() {
            followEnabled = !followEnabled;
            const toggleEl = document.getElementById('follow-toggle');
            const dotEl = document.getElementById('follow-dot');
            const textEl = document.getElementById('follow-text');

            if (followEnabled) {
                toggleEl.classList.add('toggle-on');
                dotEl.classList.remove('bg-red-500');
                dotEl.classList.add('bg-lime-400', 'animate-pulse');
                textEl.textContent = 'Follow: ON (1 mi)';
                startWatchingPosition();
            } else {
                toggleEl.classList.remove('toggle-on');
                dotEl.classList.remove('bg-lime-400', 'animate-pulse');
                dotEl.classList.add('bg-red-500');
                textEl.textContent = 'Follow: OFF';
                stopWatchingPosition();
            }
        }

        function startWatchingPosition() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy || 999;
                    
                    if (accuracy > 150) return; // skip low-accuracy updates
                    
                    const distanceTraveled = getDistanceInMeters(lastUpdateLat, lastUpdateLon, lat, lon);
                    
                    if (distanceTraveled >= MILE_IN_METERS) {
                        const zoomToUse = getCurrentZoomFromIframe();
                        updateMap(lat, lon, zoomToUse);
                    }
                },
                (err) => {
                    console.log('Watch error:', err);
                    if (followEnabled) document.getElementById('follow-text').textContent = 'Follow: GPS unavailable';
                },
                { 
                    enableHighAccuracy: true, 
                    maximumAge: 10000, 
                    timeout: 15000 
                }
            );
        }

        function stopWatchingPosition() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
        }

        function searchDestination() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;
            const deepLink = `https://waze.com/ul?q=${encodeURIComponent(query)}&navigate=yes`;
            window.open(deepLink, '_blank');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        window.onload = () => {
            loadDarkModePreference();
            
            // Live slider update
            slider.addEventListener('input', () => {
                updateOverlay();
                saveDarkModePreference();
            });
            
            getCurrentLocation();

            toggleFollow();
            
            setTimeout(() => {
                if (!iframe.src) {
                    updateMap(currentLat, currentLon, 14);
                }
            }, 1500);
        };

        window.addEventListener('beforeunload', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
        });
    </script>
</body>
</html>
